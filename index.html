    for (let i = 0; i < potencialyDraggedButton.length; i++) {

          let clone = draggedButton.cloneNode(true);

          // Nastavíme klonu speciální ID, abychom ho pak našli, a zneviditelníme ho
          clone.id = 'drag-placeholder';
          clone.style.visibility = 'hidden';

          // Vložíme klon do mřížky přesně před původní tlačítko
          draggedButton.parentNode.insertBefore(clone, draggedButton);
          draggedButton.classList.add('inDrag');
          draggedButton.classList.remove('buttonSet');


          // Výpočet - bereme souřadnice z (event)
          let x = event.clientX - (draggedButton.offsetWidth / 2);
          let y = event.clientY - (draggedButton.offsetHeight / 2);

          draggedButton.style.transform = `translate(${x}px, ${y}px)`;
        }
      });

  function press(char) {
    if ((!isNaN(char) && char !== null && char !== ' ') || char === '.') {
      document.getElementById('display').innerHTML += char;
      math += char;
    } else if (char === '+' || char === '-' || char === '*' || char === '/') {
      lastChar = document.getElementById('display').innerText.charAt(document.getElementById('display').innerText.length - 1);
      if (lastChar === '+' || lastChar === '-' || lastChar === '*' || lastChar === '/') {
        document.getElementById('display').innerHTML = document.getElementById('display').innerText.slice(0, -1) + char;
        math = math.slice(0, -1) + char;
      } else {
        document.getElementById('display').innerHTML += char;
        math += char;
      }
    } else if (char === '()') {
      lastChar = document.getElementById('display').innerText.charAt(document.getElementById('display').innerText.length - 1);
      if (lastChar === '+' || lastChar === '-' || lastChar === '*' || lastChar === '/' || lastChar === '(' || lastChar === '') {
        document.getElementById('display').innerHTML += '(';
        math += '(';
        bracketCount[powerLayer] = bracketCount[powerLayer] + 1;
      } else if (powerLayer > 0 && bracketCount[powerLayer - 1] === 0) {
        document.getElementById('display').innerHTML += ')';
        math += ')';
        bracketCount[powerLayer]--;
        powerLayer--;
      } else if (bracketCount[powerLayer] > 0) {
        document.getElementById('display').innerHTML += ')';
        math += ')';
        bracketCount[powerLayer]--;
      } else if (lastChar === ')') {
        document.getElementById('display').innerHTML += '*(';
        math += '*(';
        bracketCount[powerLayer]++;
      }
      else {
        document.getElementById('display').innerHTML += '*(';
        math += '*(';
        bracketCount[powerLayer]++;
      }
    } else if (char === '|') {
      lastChar = document.getElementById('display').innerText.charAt(document.getElementById('display').innerText.length - 1);
      if (lastChar === '+' || lastChar === '-' || lastChar === '*' || lastChar === '/' || lastChar === '(' || lastChar === '') {
        document.getElementById('display').innerHTML += '|';
        math += 'Math.abs(';
        absoluteCount++;
      } else if (absoluteCount > 0) {
        document.getElementById('display').innerHTML += '|';
        math += ')';
        absoluteCount--;
      } else {
        document.getElementById('display').innerHTML += '*|';
        math += '*Math.abs(';
        absoluteCount++;

      }
    } else if (char === '^2') {
      document.getElementById('display').innerHTML += '²';
      math += '**2';
    } else if (char === '^3') {
      document.getElementById('display').innerHTML += '³';
      math += '**3';
    } else if (char === '^y') {
      document.getElementById('display').innerHTML += '^(';
      math += '**(';
      powerLayer++;
      if (bracketCount.length <= powerLayer) {
        bracketCount.push(1);
      } else {
        bracketCount[powerLayer]++;
      }
    } else if (char === '+/-') {
      let lastNumStart = [...document.getElementById('display').innerText.matchAll(/[+\-\/*(]/g)].at(-1)?.index + 1;
      document.getElementById('display').innerText = document.getElementById('display').innerText.slice(0, lastNumStart) + '(-' + document.getElementById('display').innerText.slice(lastNumStart);
      math = math.slice(0, lastNumStart) + '(-' + math.slice(lastNumStart);
      bracketCount[powerLayer]++;
    } else if (char === 'sqrt') {
      document.getElementById('display').innerHTML += '√(';
      math += 'Math.sqrt(';
      bracketCount[powerLayer]++;
    } else if (char === 'C') {
      document.getElementById('display').innerHTML = '';
      math = '';
      bracketCount = [0];
      absoluteCount = 0;
      powerLayer = 0;
    } else if (char === 'DEL') {
      lastChar = document.getElementById('display').innerText.charAt(document.getElementById('display').innerText.length - 1);
      if (lastChar === '(') {
        bracketCount[powerLayer]--;
        math = math.slice(0, -1);
        if (math.endsWith('Math.sqrt(')) {
          math = math.slice(0, -10);

          document.getElementById('display').innerHTML = document.getElementById('display').innerText.slice(0, -2);
        } else if (math.endsWith('**(')) {
          math = math.slice(0, -3);
          powerLayer--;
          bracketCount.pop();
          document.getElementById('display').innerHTML = document.getElementById('display').innerText.slice(0, -2);
        }
      } else if (lastChar === '|') {
        if (math.endsWith('Math.abs(')) {
          math = math.slice(0, -9);
          document.getElementById('display').innerHTML = document.getElementById('display').innerText.slice(0, -1);
        } else {
          math = math.slice(0, -1);
          document.getElementById('display').innerHTML = document.getElementById('display').innerText.slice(0, -1);
        }
      } else {
        math = math.slice(0, -1);
        document.getElementById('display').innerHTML = document.getElementById('display').innerText.slice(0, -1);
      }
    } else if (char === '=') {
      if (bracketCount.some(count => count !== 0) || absoluteCount !== 0 || powerLayer !== 0) {
        alert('Please close all brackets and absolute value signs before calculating.');
        return;
      }
      document.getElementById('display').innerHTML = eval(math);
      math = eval(math);
      bracketCount = [0];
      absoluteCount = 0;
      powerLayer = 0;
    }
  }
